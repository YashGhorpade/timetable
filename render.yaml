services:
  - type: web
    name: timetable-backend
    env: docker
    dockerfilePath: backend/Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ALGORITHM
        value: "HS256"
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: ENVIRONMENT
        value: "production"

  - type: web
    name: timetable-frontend
    env: docker
    dockerfilePath: frontend/Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: "production"