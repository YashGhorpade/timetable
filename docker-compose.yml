services:
  # ─── Microsoft SQL Server ────────────────────────────────────────────────────
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: timetable_mssql
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: "GayatriFunde1709"
      MSSQL_SA_PASSWORD: "GayatriFunde1709"
    ports:
      - "1433:1433"
    volumes:
      - mssql_data:/var/opt/mssql
      - ./docker/mssql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$$SA_PASSWORD\" -Q \"SELECT 1\" -b -C"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 30s
    restart: unless-stopped

  # ─── Redis (Socket.IO adapter + caching) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: timetable_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ─── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: timetable_backend
    environment:
      DATABASE_URL: "mssql+pyodbc://sa:GayatriFunde1709@mssql:1433/timetable_db?driver=ODBC+Driver+18+for+SQL+Server&TrustServerCertificate=yes&Connection+Timeout=30&Encrypt=no"
      REDIS_URL: "redis://redis:6379"
      SECRET_KEY: "${SECRET_KEY:-super-secret-jwt-key-change-in-production}"
      ALGORITHM: "HS256"
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      ENVIRONMENT: "${ENVIRONMENT:-development}"
      CORS_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000","http://localhost:80","http://localhost:4173","http://127.0.0.1:4173","http://localhost:4174","http://127.0.0.1:4174"]'
      MSSQL_SA_PASSWORD: "GayatriFunde1709"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      mssql:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─── React Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: "http://localhost:8000"
        VITE_WS_URL: "ws://localhost:8000"
    container_name: timetable_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ─── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: timetable_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
    restart: unless-stopped

volumes:
  mssql_data:
  redis_data:

networks:
  default:
    name: timetable_network
